# ACA-Py multitenancy config for VC Trading Cards
# Aligned with digicred-crms multitenant pattern (multitenant_provider plugin).
# Used with: aca-start --arg-file /app/argfile.yml

# Admin API (backend creates tenants and lists credentials)
admin:
  - 0.0.0.0
  - 8020

# Dev: no API key. For production set admin-insecure-mode: false and admin-api-key / ACAPY_ADMIN_API_KEY.
admin-insecure-mode: true

# Transport (required by ACA-Py; DIDComm HTTP inbound)
inbound-transport:
  - [http, 0.0.0.0, 8022]
outbound-transport: [http]

# Multitenant provider plugin (see digicred-crms plugins/docker/default.yml)
plugin:
  - multitenant_provider.v1_0

plugin-config-value:
  - multitenant_provider.manager.class_name="multitenant_provider.v1_0.manager.AskarMultitokenMultitenantManager"
  - multitenant_provider.manager.always_check_provided_wallet_key=true
  - multitenant_provider.errors.on_unneeded_wallet_key=false
  - multitenant_provider.token_expiry.units=days
  - multitenant_provider.token_expiry.amount=1

# Multitenancy
multitenant: true
multitenant-admin: true
# Override via env ACAPY_JWT_SECRET in docker run
jwt-secret: change-me-use-env-in-production

# Wallet (base wallet for agent; sub-wallets created per tenant)
wallet-type: askar
wallet-name: vc-cards-base-wallet
wallet-key: change-me-in-production
wallet-local-did: true
auto-provision: true

# No ledger (wallet-only; no public DID / genesis)
no-ledger: true

log-level: info
