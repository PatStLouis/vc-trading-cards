# Run backend + Postgres (and optionally agent, ocr) on a shared network.
# Backend build is fast without OCR; run the ocr service for card image analysis (suggested fields).
#
# Single domain (API + SPA in one container):
#   docker compose up -d postgres app
#   Set BACKEND_URL and FRONTEND_URL in backend/.env to your public URL (e.g. https://tritone.cards).
#   Build arg VITE_API_URL (default below) should match.
#
# Two domains (separate frontend):
#   docker compose up -d postgres backend
#   docker compose up -d ocr   # optional: for /analyze-card-image OCR
#
# Backend needs DISCORD_* and SECRET_KEY in backend/.env. DATABASE_URL below overrides .env when using Docker.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tritone_cards
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  # Single-domain: API + SPA in one image. Use with postgres (and optional ocr).
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tritone.cards}
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tritone_cards
      OCR_SERVICE_URL: http://ocr:8001
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tritone_cards
      ACAPY_ADMIN_URL: http://agent:8020
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      OCR_SERVICE_URL: http://ocr:8001
    depends_on:
      postgres:
        condition: service_healthy
    # Optional: also wait for agent (remove if you don't run agent)
    # depends_on:
    #   - agent

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8020:8020"
      - "8022:8022"
    environment:
      ACAPY_JWT_SECRET: ${ACAPY_JWT_SECRET:-insecure-jwt-secret-min-32-chars}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    # Uses same key as backend: env_file gives ocr ADMIN_API_KEY so it validates X-OCR-API-Key from backend
    env_file:
      - ./backend/.env
